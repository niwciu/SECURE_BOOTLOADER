name: Create Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:

  release:
    name: Tag and publish release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed to check existing tags

      - name: Extract latest version from CHANGELOG
        id: version
        run: |
          VERSION=$(grep -m1 -oP '(?<=## \[)v[0-9]+\.[0-9]+\.[0-9]+(?=\])' CHANGELOG.md)
          if [ -z "$VERSION" ]; then
            echo "No version entry found in CHANGELOG.md — skipping release."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.version }}" \
              | grep -q "${{ steps.version.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} already exists — no new release needed."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.version }} is new — will create release."
          fi

      - name: Extract release notes for this version
        id: notes
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # Collect lines between the first ## [vX.Y.Z] heading and the next ## heading (or EOF)
          NOTES=$(awk '
            /^## \[v[0-9]/ { if (found) exit; found=1; next }
            found { print }
          ' CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
