###########################################################################
# IMPORTANT
# In Settings → Environments → github-pages, add the branches from which
# a pull-request merge should trigger page deployment.
###########################################################################

name: Deploy MkDocs documentation

on:
  pull_request:
    types:
      - closed
    branches:
      - main

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; do NOT cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create reports folder
        run: mkdir -p docs/reports

      - name: Download Code Coverage Report
        uses: dawidd6/action-download-artifact@v2
        with:
          name: Code_Coverage_Report
          repo: ${{ github.repository }}
          workflow: CI_pipeline.yml
          path: ./docs/reports
          search_artifacts: true

      - name: Download Code Complexity Report
        uses: dawidd6/action-download-artifact@v2
        with:
          name: Code_Complexity_Report
          repo: ${{ github.repository }}
          workflow: CI_pipeline.yml
          path: ./docs/reports
          search_artifacts: true

      - name: Copy CHANGELOG.md into docs
        run: cp CHANGELOG.md docs/CHANGELOG.md

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  cleanup:
    name: Remove previous deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    permissions: write-all
    steps:
      - name: Delete previous deployment
        uses: strumwolf/delete-deployment-environment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    needs: [build, cleanup]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
