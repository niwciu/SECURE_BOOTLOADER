site_name: Secure Bootloader
site_description: Platform-independent secure bootloader for embedded systems — AES-CBC encrypted, CRC-32 verified firmware updates over UART.
site_url: https://niwciu.github.io/SECURE_BOOTLOADER/
repo_url: https://github.com/niwciu/SECURE_BOOTLOADER
repo_name: niwciu/SECURE_BOOTLOADER

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - content.code.annotate
    - header.autohide
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      accent: deep purple
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue grey
      accent: deep orange

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - footnotes

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture:
    - architecture/index.md
    - System Overview: architecture/overview.md
    - Wire Protocol: architecture/protocol.md
    - Security Model: architecture/security.md
  - Porting Guide:
    - porting/index.md
    - Hardware Drivers: porting/hw-drivers.md
    - Configuration Reference: porting/configuration.md
  - Build System: build/cmake.md
  - Testing: testing/unit-tests.md
  - Reports: reports.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/niwciu/SECURE_BOOTLOADER
    - icon: fontawesome/solid/envelope
      link: mailto:niwciu@gmail.com
    - icon: simple/youtube
      link: https://www.youtube.com/@MyEmbeddedWay/videos

copyright: Copyright &copy; 2026 niwciu
